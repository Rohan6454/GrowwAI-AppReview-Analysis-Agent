name: Weekly App Review Insights Pipeline

on:
  schedule:
    # Run at 09:00 UTC every Monday
    - cron: '0 9 * * 1'
  workflow_dispatch: # Allow manual triggers via GitHub UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r pipeline-requirements.txt
        pip install -r mcp-server/requirements.txt
        # Execute any NLTK downloads if necessary
        python -c "import nltk; nltk.download('punkt', quiet=True); nltk.download('stopwords', quiet=True)"
        
    - name: Run Pipeline
      env:
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        MCP_GOOGLE_DOCS_DOC_ID: ${{ secrets.MCP_GOOGLE_DOCS_DOC_ID }}
        MCP_GMAIL_TO: ${{ secrets.MCP_GMAIL_TO }}
        MCP_GMAIL_SUBJECT: ${{ secrets.MCP_GMAIL_SUBJECT }}
        GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
      run: |
        python run_pipeline.py
        
    - name: Upload Pipeline Log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: pipeline-log
        path: pipeline.log
